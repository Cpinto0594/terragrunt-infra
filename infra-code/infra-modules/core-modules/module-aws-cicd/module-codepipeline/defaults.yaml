---
triggers_config:
  iac_projects_stages:
    source_action_name: Source
  project_build_stages:
    source_action_name: ProjectSource

iac_projects_stages:
  stages:
    - name: Source
      actions:
        - name: Source
          run_order: 1
          category: Source
          owner: AWS
          provider: CodeStarSourceConnection
          version: "1"
          output_artifacts:
            - infra_code
          configuration:
            FullRepositoryId: Cpinto0594/terragrunt-infra
            BranchName: main
            OutputArtifactFormat: CODE_ZIP
            DetectChanges: false
    - name: Plan
      actions:
        - name: Plan
          run_order: 1
          category: Build
          provider: CodeBuild
          version: "1"
          owner: AWS
          input_artifacts:
            - infra_code
          output_artifacts:
            - infra_code_plan
    - name: Approval
      actions:
        - name: Approval
          run_order: 1
          category: Approval
          provider: Manual
          version: "1"
          owner: AWS
          configuration:
            CustomData: Review the Terraform Plan
    - name: Apply
      actions:
        - name: Apply
          run_order: 1
          category: Build
          provider: CodeBuild
          version: "1"
          owner: AWS
          input_artifacts:
            - infra_code
            - infra_code_plan
          configuration:
            PrimarySource: infra_code

project_build_stages:
  stages:
    - name: Source
      actions:
        - name: ProjectSource
          run_order: 1
          category: Source
          owner: AWS
          provider: CodeStarSourceConnection
          namespace: "SourceVariables"
          version: "1"
          output_artifacts:
            - project_code
          configuration:
            OutputArtifactFormat: CODE_ZIP
            DetectChanges: false
        - name: InfraSource
          run_order: 2
          category: Source
          owner: AWS
          provider: CodeStarSourceConnection
          version: "1"
          output_artifacts:
            - infra_code
          configuration:
            FullRepositoryId: Cpinto0594/terragrunt-infra
            BranchName: main
            OutputArtifactFormat: CODE_ZIP
            DetectChanges: false
    - name: Build
      actions:
        - name: Build
          run_order: 1
          category: Build
          provider: CodeBuild
          version: "1"
          owner: AWS
          input_artifacts:
            - project_code
            - infra_code
          output_artifacts:
            - project_build
          configuration:
            PrimarySource: infra_code
            EnvironmentVariables:
              - name: BRANCH_NAME
                value: "#{SourceVariables.BranchName}"
                type: "PLAINTEXT"
              - name: COMMIT_ID
                value: "#{SourceVariables.CommitId}"
                type: "PLAINTEXT"
              - name: REPO_NAME
                value: "#{SourceVariables.FullRepositoryName}"
                type: "PLAINTEXT"
    - name: Approval
      actions:
        - name: Approval
          run_order: 1
          category: Approval
          provider: Manual
          version: "1"
          owner: AWS
          configuration:
            CustomData: Review the Repo changes
    - name: Deploy
      actions:
        - name: Deploy
          run_order: 1
          category: Build
          provider: CodeBuild
          version: "1"
          owner: AWS
          input_artifacts:
            - infra_code
            - project_code
            - project_build
          configuration:
            PrimarySource: infra_code
