cluster_defaults:
  role_arn: EksClustersServiceRole
  authentication_mode: API
  bootstrap_cluster_creator_admin_permissions: true
  cluster_security_groups:
    - eks_cluster_sec_group
  logs_retention_days: 30
  cluster_version: '1.36'
  enabled_cluster_log_types:
    - api
    - controllerManager

cluster_node_defaults:
  node_group_role: EksClustersNodeGroupsServiceRole
  instance_types:
    - t3.small
  ami_type: AL2_x86_64
  disk_size: 50
  capacity_type: ON_DEMAND
  scaling_config:
    desired_size: 2
    max_size: 3
    min_size: 1
  update_config:
    max_unavailable: 1

# Common Kubernetes RBAC roles:
# - cluster-admin : Full cluster administrator
# - admin         : Namespace administrator
# - edit          : Developer (read/write)
# - view          : Read-only
#
# Rough EKS policy equivalents:
# - AmazonEKSClusterAdminPolicy -> cluster-admin
# - AmazonEKSAdminPolicy        -> admin
# - AmazonEKSEditPolicy         -> edit
# - AmazonEKSViewPolicy         -> view