version: 0.2

phases:
  pre_build:
    commands:
      - ls
      - chmod +x ./Codebuild/scripts/install_terragrunt.sh
      - chmod +x ./Codebuild/scripts/bootstrap/terragrunt_plan.sh
      - ./Codebuild/scripts/install_terragrunt.sh
      
  build:
    commands:
      - echo Build started on `date`
      - echo Running Terraform plan...
      - ./Codebuild/scripts/bootstrap/terragrunt_plan.sh
          
    

artifacts:
  name: infra_code_plan
  files:
    - '**/*'
  base-directory: "outputs"